<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ljósmyndun — Okið</title>
    <meta name="description" content="Ljósmyndun eftir Okið.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="has-glacier-bg glacier-center-left">

    <nav>
        <a href="index.html" class="nav-logo">
            <img src="images/okid_logo_white.png" alt="Okið" class="nav-logo-img">
        </a>
        <ul class="nav-links">
            <li><a href="projects.html"><span data-is="Verkefni" data-en="Projects">Verkefni</span></a></li>
            <li><a href="photography.html" class="active"><span data-is="Ljósmyndun" data-en="Photography">Ljósmyndun</span></a></li>
            <li><a href="about.html"><span data-is="Um Okið" data-en="About">Um Okið</span></a></li>
            <li><a href="contact.html"><span data-is="Hafa samband" data-en="Contact">Hafa samband</span></a></li>
        </ul>
        <button id="lang-toggle" class="lang-toggle">EN</button>
    </nav>

    <main>
        <div class="page-header" style="text-align: center;">
            <h1 data-is="Ljósmyndun" data-en="Photography">Ljósmyndun</h1>
        </div>

        <div class="gallery-section">
            <h2 class="gallery-title">scapes of a regular life</h2>
            <div class="slideshow" id="slideshow-lal">
                <button class="slide-arrow slide-prev" aria-label="Previous">&#8592;</button>
                <div class="slide-image-wrap">
                    <img id="slide-img" src="images/lal/1.JPG" alt="1 of 15">
                </div>
                <button class="slide-arrow slide-next" aria-label="Next">&#8594;</button>
            </div>
            <p class="slide-counter"><span id="slide-current">1</span> / <span id="slide-total"></span></p>
        </div>

        <div class="gallery-section">
            <h2 class="gallery-title">Portraits</h2>
            <div class="slideshow" id="slideshow-portraits">
                <button class="slide-arrow slide-prev" aria-label="Previous">&#8592;</button>
                <div class="slide-image-wrap">
                    <img id="slide-img-portraits" src="images/portraits/IMG_8724.jpg" alt="1 of 10">
                </div>
                <button class="slide-arrow slide-next" aria-label="Next">&#8594;</button>
            </div>
            <p class="slide-counter"><span id="slide-current-portraits">1</span> / <span id="slide-total-portraits"></span></p>
        </div>
    </main>

    <footer>
        <span class="footer-copy">&copy; 2026 Okið</span>
    </footer>

    <script src="lang.js"></script>
    <script>
        const images = [
            'images/lal/1.JPG',
            'images/lal/2.JPG',
            'images/lal/3.JPG',
            'images/lal/4.JPG',
            'images/lal/5.JPG',
            'images/lal/6.JPG',
            'images/lal/7.JPG',
            'images/lal/8.JPG',
            'images/lal/9.JPG',
            'images/lal/10.JPG',
            'images/lal/11.JPG',
            'images/lal/12.JPG',
            'images/lal/13.jpg',
            'images/lal/IMG_8715.jpg',
            'images/lal/IMG_8716.jpg',
            'images/lal/IMG_8717.jpg',
            'images/lal/IMG_8718.jpg',
            'images/lal/IMG_8719.jpg',
            'images/lal/IMG_8720.jpg',
            'images/lal/IMG_8721.jpg',
            'images/lal/IMG_8722.jpg',
        ];
        let current = 0;
        const img = document.getElementById('slide-img');
        const counter = document.getElementById('slide-current');
        document.getElementById('slide-total').textContent = images.length;

        function goTo(index) {
            current = (index + images.length) % images.length;
            img.src = images[current];
            img.alt = (current + 1) + ' of ' + images.length;
            counter.textContent = current + 1;
        }

        document.querySelector('#slideshow-lal .slide-prev').addEventListener('click', () => goTo(current - 1));
        document.querySelector('#slideshow-lal .slide-next').addEventListener('click', () => goTo(current + 1));

        // Portraits slideshow
        const portraitImages = [
            'images/portraits/IMG_8724.jpg',
            'images/portraits/IMG_8725.jpg',
            'images/portraits/IMG_8726.jpg',
            'images/portraits/IMG_8727.jpg',
            'images/portraits/IMG_8728.jpg',
            'images/portraits/IMG_8729.jpg',
            'images/portraits/IMG_8730.jpg',
            'images/portraits/IMG_8731.jpg',
            'images/portraits/IMG_8732.jpg',
            'images/portraits/IMG_8733.jpg',
        ];
        let portraitCurrent = 0;
        const portraitImg = document.getElementById('slide-img-portraits');
        const portraitCounter = document.getElementById('slide-current-portraits');
        document.getElementById('slide-total-portraits').textContent = portraitImages.length;

        function goToPortrait(index) {
            portraitCurrent = (index + portraitImages.length) % portraitImages.length;
            portraitImg.src = portraitImages[portraitCurrent];
            portraitImg.alt = (portraitCurrent + 1) + ' of ' + portraitImages.length;
            portraitCounter.textContent = portraitCurrent + 1;
        }

        document.querySelector('#slideshow-portraits .slide-prev').addEventListener('click', () => goToPortrait(portraitCurrent - 1));
        document.querySelector('#slideshow-portraits .slide-next').addEventListener('click', () => goToPortrait(portraitCurrent + 1));
    </script>
</body>
</html>
